<!DOCTYPE html>

<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Capital Compass</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>

        <div class="calculator">

            <div class="top-actions">
                <button id="resetar" 
                class="btn-resetar">
                    Limpar Carteira
                </button>
            </div>

            <h1>CAPITAL COMPASS - Calculadora de Renda Variável</h1>
        
            <div class="form-group">
                <label for="ticker">Ticker</label>
                <input type="text" id="ticker" placeholder="Ex: PETR4">
            </div>

            <div class="form-group">
                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" placeholder="100">
            </div>

            <div class="form-group">
                <label for="preco-pago">Preço Médio(R$)</label>
                <input type="number" id="preco-pago" placeholder="25.50">
            </div>
            
            <div class="form-group">
                <label for="preco-atual">Preço Atual(R$)</label>
                <input type="number" id="preco-atual">
            </div>

            <div class="form-group">
                <label for="dividendo">Dividendos p/cota (R$)</label>
                <input type="number" id="dividendo">
            </div>

            <button id="calcular">Calcular</button>

            <div id="resultado" class="resultado hidden"></div>
        </div>

        <!--Dashboard-->
            <div id="dashboard" class="dashboard hiddden">
                <div class="dash-card">
                        <div class="dash-label">Patrimonio Total</div>
                        <div class="dash-value" id="dash-patrimonio">R$ 0,00</div>
                </div>
                    <div class="dash-card">
                        <div class="dash-label">Total Investido</div>
                        <div class="dash-value" id="dash-investido">R$ 0,00</div>
                </div>
                    <div class="dash-card">
                        <div class="dash-label">Resultado Total</div>
                        <div class="dash-value" id="dash-resultado">R$ 0,00</div>
                </div>
                    <div class="dash-card">
                        <div class="dash-label">Renda Mensal</div>
                        <div class="dash-value" id="dash-mensal">R$ 0,00</div>
                </div>
                    <div class="dash-card">
                        <div class="dash-label">Renda Anual</div>
                        <div class="dash-value" id="dash-anual">R$ 0,00</div>
                </div>
                    <div class="dash-card">
                        <div class="dash-label">DY Medio</div>
                        <div class="dash-value" id="dash-dy">R$ 0,00</div>
                </div>
            </div>

        
<table id="tabela-carteira">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Qtd</th>
            <th>Preço Médio</th>
            <th>Preço Atual</th>
            <th>Resultado</th>
            <th>Variação</th>
            <th>Renda Mensal</th>
            <th>Dividend Yield</th>
            
        </tr>
    </thead>
    <tbody id="tbody-carteira"></tbody>
</table>

<script src="script.js"></script>

    </body>
</html>
